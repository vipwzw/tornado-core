version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "tornadocash/core-team"
    assignees:
      - "tornadocash/core-team"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
    ignore:
      # Ignore major version updates for critical dependencies
      - dependency-name: "truffle"
        update-types: ["version-update:semver-major"]
      - dependency-name: "ganache-cli"
        update-types: ["version-update:semver-major"]
      # Ignore updates to git dependencies (custom forks)
      - dependency-name: "circomlib"
      - dependency-name: "snarkjs"
      - dependency-name: "websnark"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "github-actions"
      - "ci"
