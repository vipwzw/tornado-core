name: CI/CD Pipeline

on:
  push:
    branches: ['*']
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  pull_request:

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Cache circuits build
        uses: actions/cache@v3
        with:
          path: build/circuits
          key: circuits-${{ hashFiles('circuits/**/*.circom') }}-v2
          restore-keys: |
            circuits-${{ hashFiles('circuits/**/*.circom') }}-
            circuits-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate circuit files and keys
        run: |
          echo "🔧 Generating circuit files..."

          # Clean any existing build artifacts to avoid corruption
          rm -rf build/circuits
          mkdir -p build/circuits

          # Generate all circuit files from scratch
          yarn download

          echo "📋 Verifying generated files:"
          ls -la build/circuits/ || echo "❌ build/circuits directory not found"

          # Comprehensive file validation
          if [ -f build/circuits/withdraw_proving_key.bin ]; then
            SIZE=$(stat -c%s build/circuits/withdraw_proving_key.bin 2>/dev/null || stat -f%z build/circuits/withdraw_proving_key.bin)
            SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc -l)
            echo "✅ withdraw_proving_key.bin exists ($SIZE bytes = ${SIZE_MB}MB)"

            # Expected size should be around 13-15MB
            if [ $SIZE -lt 10000000 ]; then
              echo "❌ ERROR: Proving key file too small (expected ~14MB, got ${SIZE_MB}MB)"
              echo "This indicates corrupted or incomplete key generation"
              exit 1
            fi
          else
            echo "❌ withdraw_proving_key.bin missing"
            exit 1
          fi

          if [ -f build/circuits/withdraw_verification_key.json ]; then
            SIZE=$(stat -c%s build/circuits/withdraw_verification_key.json 2>/dev/null || stat -f%z build/circuits/withdraw_verification_key.json)
            echo "✅ withdraw_verification_key.json exists ($SIZE bytes)"

            # Verify it contains valid JSON
            if ! jq empty build/circuits/withdraw_verification_key.json; then
              echo "❌ ERROR: Verification key JSON is invalid"
              exit 1
            fi
          else
            echo "❌ withdraw_verification_key.json missing"
            exit 1
          fi

          if [ -f build/circuits/withdraw.json ]; then
            SIZE=$(stat -c%s build/circuits/withdraw.json 2>/dev/null || stat -f%z build/circuits/withdraw.json)
            echo "✅ withdraw.json exists ($SIZE bytes)"

            # Verify it contains valid JSON
            if ! jq empty build/circuits/withdraw.json; then
              echo "❌ ERROR: Circuit JSON is invalid"
              exit 1
            fi
          else
            echo "❌ withdraw.json missing"
            exit 1
          fi

      - name: Setup environment
        run: cp .env.example .env

      - name: Start Ganache
        run: npx ganache-cli --deterministic --accounts 10 --host 0.0.0.0 --port 8545 > ganache.log 2>&1 &

      - name: Wait for Ganache
        run: |
          echo "⏳ Waiting for Ganache to start..."
          for i in {1..30}; do
            if curl -s -X POST -H "Content-Type: application/json" \
               --data '{"jsonrpc":"2.0","method":"net_version","params":[],"id":1}' \
               http://localhost:8545 > /dev/null; then
              echo "✅ Ganache is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Ganache failed to start within 30 seconds"
              cat ganache.log
              exit 1
            fi
            sleep 1
          done

      - name: Build contracts
        run: npm run build:contract

      - name: Deploy contracts
        run: npm run migrate:dev

      - name: Verify deployment
        run: |
          echo "🔍 Verifying contract deployment..."
          # Test basic contract functionality
          node -e "
            const Web3 = require('web3');
            const web3 = new Web3('http://localhost:8545');
            const contract = require('./build/contracts/ETHTornado.json');
            console.log('Contract ABI loaded successfully');
            console.log('Networks available:', Object.keys(contract.networks || {}));
          "

      - name: Run tests with enhanced error handling
        run: |
          echo "🧪 Running test suite..."
          # Set environment variables for better error reporting
          export DEBUG_SNARK=true
          export SHOW_PROOF_ERRORS=true

          # Run tests and capture output
          if ! yarn test; then
            echo "❌ Tests failed. Checking for common issues..."

            # Check if Ganache is still running
            if ! curl -s http://localhost:8545 > /dev/null; then
              echo "❌ Ganache appears to have stopped"
              tail -n 50 ganache.log
            fi

            # Check circuit files again
            echo "📋 Re-checking circuit files after test failure:"
            ls -la build/circuits/

            exit 1
          fi

          echo "✅ All tests passed!"

      - name: Cleanup
        if: always()
        run: |
          # Stop Ganache
          pkill -f ganache-cli || true
          # Clean up log files
          rm -f ganache.log ganache.pid

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run yarn audit
        run: yarn audit --level moderate
        continue-on-error: true

      - name: Build contracts for Slither analysis
        run: |
          mkdir -p build/circuits
          mkdir -p build/contracts
          npm run build:contract
        continue-on-error: true

      - name: Run Slither analysis
        uses: crytic/slither-action@v0.3.0
        id: slither
        with:
          sarif: results.sarif
          fail-on: none

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: ESLint
        run: yarn eslint

      - name: Prettier check
        run: yarn prettier:check

      - name: Solidity lint
        run: npx solhint 'contracts/**/*.sol'
