name: CI/CD Pipeline

on:
  push:
    branches: ['*']
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  pull_request:

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Cache circuits build
        uses: actions/cache@v3
        with:
          path: build/circuits
          key: circuits-${{ hashFiles('circuits/**/*.circom') }}
          restore-keys: circuits-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download ceremony keys
        run: yarn download

      - name: Setup environment
        run: cp .env.example .env

      - name: Start Ganache
        run: npx ganache-cli > /dev/null &

      - name: Build circuits
        run: npm run build:circuit

      - name: Build contracts
        run: npm run build:contract

      - name: Deploy contracts
        run: npm run migrate:dev

      - name: Run tests
        run: yarn test

      - name: Test CLI
        run: node src/cli.js test

      - name: Run coverage (Node 24 only)
        if: matrix.node-version == 24
        run: yarn coverage

      - name: Upload coverage to Coveralls (Node 24 only)
        if: matrix.node-version == 24
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run yarn audit
        run: yarn audit --level moderate
        continue-on-error: true

      - name: Build contracts for Slither analysis
        run: |
          mkdir -p build/circuits
          mkdir -p build/contracts
          npm run build:contract
        continue-on-error: true

      - name: Run Slither analysis
        uses: crytic/slither-action@v0.3.0
        id: slither
        with:
          sarif: results.sarif
          fail-on: none

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: ESLint
        run: yarn eslint

      - name: Prettier check
        run: yarn prettier:check

      - name: Solidity lint
        run: npx solhint 'contracts/**/*.sol'
